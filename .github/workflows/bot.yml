name: TDnet Bot

on:
  schedule:
    - cron: '*/5 0-6 * * 1-5'  # 日本9-15時。平日5分おき
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    permissions:          # ← この3行を追加
      contents: write     # ← リポジトリへの書き込み権限
    steps:
      - uses: actions/checkout@v4  # ← v3をv4に更新。警告も消える
      
      - name: Set up Python
        uses: actions/setup-python@v5  # ← v4をv5に更新
        with:
          python-version: '3.10'
          
      - name: Install packages
        run: pip install requests beautifulsoup4 lxml
        
      - name: Run bot
        run: python tdnet_bot.py
        
      - name: Commit sent_ids
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add sent_ids.json
          git commit -m "Update sent_ids" || exit 0
          git push
