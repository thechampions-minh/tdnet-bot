name: Volume Spike Bot

on:
  schedule:
    - cron: '*/3 0 * * 1-5'
    - cron: '30-59/3 5 * * 1-5'
  workflow_dispatch:

jobs:
  run-volume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install requests beautifulsoup4 yfinance  # ← ここにyfinance追加
      - name: Run Volume Bot
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python volume_spike_bot.py
